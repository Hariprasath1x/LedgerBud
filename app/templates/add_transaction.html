{% extends "base.html" %}

{% block title %}Add Transaction{% endblock %}
{% block page_title %}Add Transaction{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
  <form method="POST" action="{{ url_for('transactions.add') }}" class="flex flex-col gap-lg">
    
    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="flex gap-sm">
        <label style="flex: 1; display: flex; align-items: center; gap: 8px; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer;">
          <input type="radio" name="type" value="debit" checked>
          <span>Expense</span>
        </label>
        <label style="flex: 1; display: flex; align-items: center; gap: 8px; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer;">
          <input type="radio" name="type" value="credit">
          <span>Income</span>
        </label>
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input type="number" step="0.01" name="amount" class="form-control" required placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" required id="date-input">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Description / Merchant</label>
      <input type="text" name="description" class="form-control" required placeholder="e.g., Coffee at Starbucks">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Wallet</label>
        <select name="wallet_id" class="form-control" required>
          <option value="">Select Wallet</option>
          {% for w in wallets %}
          <option value="{{ w.id }}">{{ w.name }} (₹{{ '{:,.2f}'.format(w.balance) }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category_id" class="form-control">
          <option value="">Uncategorized</option>
          {% for c in categories %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notes (Optional)</label>
      <textarea name="notes" class="form-control" rows="3" placeholder="Additional details..."></textarea>
    </div>

    <div class="flex gap-md" style="margin-top: var(--space-md);">
      <button type="submit" class="btn btn-primary" style="flex: 1;">Save Transaction</button>
      <a href="{{ url_for('transactions.index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Set date to today by default
  document.getElementById('date-input').valueAsDate = new Date();
</script>
{% endblock %}
