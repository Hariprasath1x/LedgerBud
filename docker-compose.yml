version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ledgerbud_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledgerbud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgerbud"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ledgerbud_web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ledgerbud
      - FLASK_ENV=development
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
